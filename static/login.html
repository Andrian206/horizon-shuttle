<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk — Horizon AI Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0050cb",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424656",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "body": ["Inter"],
                        "headline": ["Manrope"]
                    }
                }
            }
        }
    </script>
    
    <style>
        .bg-ethereal-gradient {
            background: linear-gradient(135deg, #f0f4ff 0%, #e0f7fa 50%, #f5f5f5 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #0050cb;
            box-shadow: 0 0 0 3px rgba(0, 80, 203, 0.1);
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>

<body class="bg-ethereal-gradient min-h-screen font-body text-on-surface flex items-center justify-center p-4 relative overflow-hidden">

    <div class="floating-shape w-72 h-72 bg-primary/10 -top-20 -left-20" style="animation-delay:0s"></div>
    <div class="floating-shape w-96 h-96 bg-cyan-200/10 top-1/2 -right-20" style="animation-delay:2s"></div>
    <div class="floating-shape w-64 h-64 bg-primary/5 bottom-0 left-1/3" style="animation-delay:4s"></div>

    <div class="w-full max-w-md animate-fade-in-up relative z-10">
        
        <div class="text-center mb-8">
            <div class="relative w-16 h-16 mx-auto mb-4">
                <div class="absolute inset-0 bg-white/50 backdrop-blur-md rounded-2xl border border-white/60 shadow-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-3xl text-primary">smart_toy</span>
                </div>
            </div>
            <h1 class="text-2xl font-headline font-bold text-on-surface tracking-tight">
                Horizon <span class="text-primary">AI</span> Workspace
            </h1>
            <p class="text-sm text-on-surface-variant mt-1 opacity-80">
                Masuk untuk mengakses asisten bisnis internal
            </p>
        </div>

        <div class="glass-panel rounded-3xl p-8 shadow-[0_12px_40px_rgba(0,0,0,0.06)] border border-white/50">
            
            <div id="error-message" class="hidden mb-4 p-3 bg-error-container border border-error/20 rounded-xl text-sm text-on-error-container">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">error</span>
                    <span id="error-text">Username atau password salah</span>
                </div>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-on-surface mb-1.5">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-lg">person</span>
                        <input type="text" id="username" required autocomplete="username"
                               class="glass-input w-full pl-10 pr-4 py-3 rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none"
                               placeholder="Masukkan username">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-on-surface mb-1.5">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-lg">lock</span>
                        <input type="password" id="password" required autocomplete="current-password"
                               class="glass-input w-full pl-10 pr-12 py-3 rounded-xl text-sm text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none"
                               placeholder="Masukkan password">
                        <button type="button" onclick="togglePassword()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors p-1">
                            <span id="eye-icon" class="material-symbols-outlined text-lg">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button type="submit" id="login-btn"
                        class="w-full py-3.5 bg-primary hover:bg-primary/90 text-on-primary rounded-xl font-semibold text-sm shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                    <span id="btn-text">Masuk</span>
                    <span id="btn-spinner" class="hidden material-symbols-outlined animate-spin text-lg">progress_activity</span>
                </button>
            </form>

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-on-surface/10"></div>
                <span class="text-xs text-on-surface-variant/60">atau</span>
                <div class="flex-1 h-px bg-on-surface/10"></div>
            </div>

            <a href="/static/chat.html"
               class="w-full py-3 bg-white/40 hover:bg-white/60 text-on-surface rounded-xl font-medium text-sm border border-white/40 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">chat</span>
                Coba Horizon AI Public
            </a>
        </div>

        <div class="text-center mt-6">
            <p class="text-xs text-on-surface-variant/60">Horizon Shuttle &copy; 2026</p>
            <p class="text-xs text-on-surface-variant/40 mt-1">Powered by Gemini AI</p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
