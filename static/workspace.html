<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon AI Workspace</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config (dari desainmu) -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0050cb",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424656",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed-dim": "#00dbe9",
                        "primary-container": "#0066ff",
                        "on-primary-container": "#f8f7ff",
                        "outline": "#727687",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "body": ["Inter"],
                        "headline": ["Manrope"]
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .bg-ethereal-gradient {
            background: linear-gradient(135deg, #f0f4ff 0%, #e0f7fa 50%, #f5f5f5 100%);
        }
        
        /* Chat message animations */
        @keyframes message-pop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim {
            animation: message-pop 0.3s ease-out;
        }
        
        /* Loading dots */
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .loading-dot {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        /* Scrollbar styling */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
        
        /* Mode colors */
        .mode-assistant { --mode-color: #0050cb; }
        .mode-draft { --mode-color: #006970; }
        .mode-insight { --mode-color: #a33200; }
    </style>
</head>

<body class="bg-ethereal-gradient min-h-screen font-body text-on-surface overflow-hidden">

    <!-- Header -->
    <header class="w-full fixed top-0 bg-surface/40 backdrop-blur-xl border-b border-white/20 shadow-sm z-50">
        <div class="flex justify-between items-center px-4 h-16 w-full">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-primary cursor-pointer hover:bg-white/10 p-2 rounded-lg transition-colors" onclick="toggleSidebar()">menu</span>
                <span class="text-xl font-headline font-bold text-primary">Horizon AI Workspace</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="user-name" class="text-sm text-on-surface-variant hidden md:block">Admin</span>
                <button onclick="logout()" class="text-sm text-error hover:bg-error/10 px-3 py-1.5 rounded-lg transition-colors">
                    Keluar
                </button>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav id="sidebar" class="h-full w-[280px] fixed left-0 top-0 pt-16 bg-surface-container-low/60 backdrop-blur-2xl border-r border-white/20 shadow-md flex-col p-2 gap-2 z-40 flex transition-transform duration-300">
        <div class="mt-4 px-3 py-2">
            <button onclick="startNewChat()" class="w-full py-3 px-4 bg-primary text-on-primary rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-transform hover:bg-primary/90">
                <span class="material-symbols-outlined text-lg">add</span>
                Chat Baru
            </button>
        </div>
        
        <!-- Mode Indicator -->
        <div class="px-3 py-2">
            <div class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 px-2">Mode Aktif</div>
            <div id="current-mode-display" class="flex items-center gap-2 px-3 py-2 bg-white/30 rounded-lg border border-white/40">
                <span id="mode-icon" class="material-symbols-outlined text-primary text-lg">chat</span>
                <span id="mode-label" class="text-sm font-medium">Assistant</span>
            </div>
        </div>
        
        <!-- History List -->
        <div class="flex-1 overflow-y-auto custom-scroll px-2 mt-2">
            <div class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 px-2">Riwayat</div>
            <div id="chat-history-list" class="space-y-1">
                <!-- History items will be loaded here -->
                <div class="text-on-surface-variant/50 text-sm px-3 py-2 italic">Belum ada riwayat</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="md:ml-[280px] min-h-screen flex flex-col pt-16 relative transition-all duration-300">
        
        <!-- Background decorative -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-fixed-dim/5 blur-[120px] rounded-full"></div>
        </div>

        <!-- Chat Container -->
        <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 relative z-10 w-full max-w-4xl mx-auto">
            
            <!-- Welcome State (shown when no messages) -->
            <div id="welcome-state" class="w-full flex flex-col items-center text-center mb-8">
                <div class="relative w-20 h-20 mb-6">
                    <div class="absolute inset-0 bg-white/40 backdrop-blur-md rounded-2xl border border-white/60 shadow-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-4xl text-primary">smart_toy</span>
                    </div>
                </div>
                <h1 class="text-3xl md:text-4xl font-headline font-bold text-on-surface tracking-tight mb-2">
                    Horizon <span class="text-primary">AI</span> Workspace
                </h1>
                <p class="text-on-surface-variant max-w-md mx-auto opacity-80 text-sm md:text-base">
                    Asisten bisnis untuk operasional, konten, dan analisis Horizon Shuttle.
                </p>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="w-full flex-1 overflow-y-auto custom-scroll space-y-4 mb-4 hidden">
                <!-- Messages will appear here -->
            </div>

            <!-- Input Area -->
            <div class="w-full glass-panel rounded-2xl p-4 shadow-[0_12px_40px_rgba(0,0,0,0.05)] border border-white/40">
                
                <!-- Mode Selector (Dropdown) -->
                <div class="flex items-center gap-2 mb-3 px-1">
                    <div class="relative">
                        <select id="mode-selector" onchange="changeMode(this.value)" 
                                class="appearance-none bg-white/50 hover:bg-white/70 border border-white/40 rounded-lg px-3 py-1.5 pr-8 text-sm font-medium text-on-surface cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
                            <option value="assistant">💬 Assistant</option>
                            <option value="draft">✍️ Draft</option>
                            <option value="insight">📈 Insight</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-sm pointer-events-none text-on-surface-variant">keyboard_arrow_down</span>
                    </div>
                    <span id="mode-desc" class="text-xs text-on-surface-variant/70">Tanya tentang SOP, kebijakan, informasi internal</span>
                </div>

                <!-- Input Wrapper -->
                <div class="relative flex items-end bg-white/30 rounded-xl border border-white/30 focus-within:border-primary/50 focus-within:ring-2 focus-within:ring-primary/10 transition-all p-2">
                    <button class="p-2 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-white/40 mb-1">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                    
                    <textarea id="chat-input" 
                              class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface py-2 px-2 resize-none placeholder:text-on-surface-variant/50 font-body text-base max-h-32"
                              oninput="autoResize(this)"
                              onkeydown="handleKeyDown(event)"
                              placeholder="Tanya tentang Horizon Shuttle..."
                              rows="1"></textarea>
                    
                    <div class="flex items-center gap-2 pl-2 pb-1">
                        <button onclick="sendMessage()" id="send-btn"
                                class="bg-primary hover:bg-primary/90 text-on-primary h-10 w-10 rounded-xl flex items-center justify-center shadow-md active:scale-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <span class="material-symbols-outlined">arrow_upward</span>
                        </button>
                    </div>
                </div>
                
                <!-- Loading Indicator -->
                <div id="loading-indicator" class="hidden flex items-center gap-2 mt-3 px-2">
                    <div class="flex gap-1">
                        <div class="w-2 h-2 bg-primary rounded-full loading-dot"></div>
                        <div class="w-2 h-2 bg-primary rounded-full loading-dot"></div>
                        <div class="w-2 h-2 bg-primary rounded-full loading-dot"></div>
                    </div>
                    <span class="text-xs text-on-surface-variant">Horizon AI sedang berpikir...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const API_BASE = ''; // Kosong = same origin (FastAPI serve static + API)
        
        const MODE_CONFIG = {
            assistant: {
                icon: 'chat',
                label: 'Assistant',
                desc: 'Tanya tentang SOP, kebijakan, informasi internal',
                placeholder: 'Tanya tentang Horizon Shuttle...'
            },
            draft: {
                icon: 'edit',
                label: 'Draft',
                desc: 'Buat broadcast, caption, email, pengumuman',
                placeholder: 'Contoh: Buat pengumuman keterlambatan...'
            },
            insight: {
                icon: 'analytics',
                label: 'Insight',
                desc: 'Analisis data dan rekomendasi bisnis',
                placeholder: 'Contoh: Rute mana yang paling ramai?'
            }
        };

        // ==========================================
        // STATE
        // ==========================================
        let currentMode = 'assistant';
        let currentSessionId = null;
        let isLoading = false;
        let messages = [];

        // ==========================================
        // AUTH CHECK
        // ==========================================
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/static/login.html';
                return null;
            }
            return token;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/static/login.html';
        }

        // Set user name from stored data
        const userData = JSON.parse(localStorage.getItem('user') || '{}');
        if (userData.nama) {
            document.getElementById('user-name').textContent = userData.nama;
        }

        // ==========================================
        // SIDEBAR
        // ==========================================
        let sidebarOpen = true;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            sidebarOpen = !sidebarOpen;
            
            if (window.innerWidth >= 768) {
                if (sidebarOpen) {
                    sidebar.classList.remove('-translate-x-full');
                    main.classList.remove('ml-0');
                    main.classList.add('md:ml-[280px]');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    main.classList.remove('md:ml-[280px]');
                    main.classList.add('ml-0');
                }
            } else {
                sidebar.classList.toggle('-translate-x-full');
            }
        }

        // Mobile: hide sidebar by default
        if (window.innerWidth < 768) {
            sidebarOpen = false;
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('main-content').classList.remove('md:ml-[280px]');
        }

        // ==========================================
        // MODE SWITCHING
        // ==========================================
        function changeMode(mode) {
            currentMode = mode;
            const config = MODE_CONFIG[mode];
            
            // Update UI
            document.getElementById('mode-icon').textContent = config.icon;
            document.getElementById('mode-label').textContent = config.label;
            document.getElementById('mode-desc').textContent = config.desc;
            document.getElementById('chat-input').placeholder = config.placeholder;
            
            // Update color accent
            const display = document.getElementById('current-mode-display');
            display.className = `flex items-center gap-2 px-3 py-2 rounded-lg border border-white/40 mode-${mode}`;
        }

        // ==========================================
        // CHAT UI HELPERS
        // ==========================================
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showLoading(show) {
            const indicator = document.getElementById('loading-indicator');
            const btn = document.getElementById('send-btn');
            isLoading = show;
            
            if (show) {
                indicator.classList.remove('hidden');
                btn.disabled = true;
            } else {
                indicator.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const welcome = document.getElementById('welcome-state');
            
            // Hide welcome on first message
            if (messages.length === 0) {
                welcome.classList.add('hidden');
                container.classList.remove('hidden');
            }

            const div = document.createElement('div');
            div.className = `message-anim flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[80%] md:max-w-[70%] p-3.5 rounded-2xl text-sm leading-relaxed ${
                role === 'user' 
                    ? 'bg-primary text-on-primary rounded-br-md' 
                    : 'bg-white/60 backdrop-blur-sm text-on-surface border border-white/40 rounded-bl-md'
            }`;
            bubble.innerHTML = formatContent(content);
            
            div.appendChild(bubble);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            messages.push({ role, content });
        }

        function formatContent(text) {
            // Simple formatting: convert newlines to <br>, bold with **
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        // ==========================================
        // API CALLS
        // ==========================================
        async function sendMessage() {
            const token = checkAuth();
            if (!token) return;
            
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Show user message
            appendMessage('user', message);
            showLoading(true);
            
            try {
                const response = await fetch(`${API_BASE}/api/workspace/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        session_id: currentSessionId
                    })
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                appendMessage('assistant', data.reply);
                
                // Save session ID if new
                if (data.session_id) {
                    currentSessionId = data.session_id;
                }
                
            } catch (error) {
                console.error('Error:', error);
                appendMessage('assistant', 'Maaf, terjadi kesalahan. Silakan coba lagi.');
            } finally {
                showLoading(false);
            }
        }

        function startNewChat() {
            currentSessionId = null;
            messages = [];
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('chat-messages').classList.add('hidden');
            document.getElementById('welcome-state').classList.remove('hidden');
            document.getElementById('chat-input').focus();
        }

        // ==========================================
        // INIT
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            changeMode('assistant');
            document.getElementById('chat-input').focus();
        });
    </script>
</body>
</html>
