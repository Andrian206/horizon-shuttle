<!DOCTYPE html>
<html lang="id" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon AI Workspace</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0050cb",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424656",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed-dim": "#00dbe9",
                        "primary-container": "#0066ff",
                        "on-primary-container": "#f8f7ff",
                        "outline": "#727687",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "body": ["Inter"],
                        "headline": ["Manrope"]
                    }
                }
            }
        }
    </script>

    <style>
        .bg-ethereal-gradient {
            background: linear-gradient(135deg, #f0f4ff 0%, #e0f7fa 50%, #f5f5f5 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #0050cb;
            box-shadow: 0 0 0 3px rgba(0, 80, 203, 0.1);
        }

        @keyframes message-pop {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-anim {
            animation: message-pop 0.3s ease-out;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .loading-dot {
            animation: bounce 1.4s infinite ease-in-out both;
            width: 8px;
            height: 8px;
            background: #0050cb;
            border-radius: 50%;
            display: inline-block;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-ethereal-gradient min-h-screen font-body text-on-surface overflow-hidden">

    <!-- Header -->
    <header class="w-full fixed top-0 bg-surface/40 backdrop-blur-xl border-b border-white/20 shadow-sm z-50">
        <div class="flex justify-between items-center px-4 h-16 w-full">
            <div class="flex items-center gap-4">
                <span
                    class="material-symbols-outlined text-primary cursor-pointer hover:bg-white/10 p-2 rounded-lg transition-colors"
                    onclick="toggleSidebar()">menu</span>
                <span class="text-xl font-headline font-bold text-primary">Horizon AI Workspace</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="user-name" class="text-sm text-on-surface-variant hidden md:block">Admin</span>
                <button onclick="logout()"
                    class="text-sm text-error hover:bg-error/10 px-3 py-1.5 rounded-lg transition-colors">
                    Keluar
                </button>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <nav id="sidebar"
        class="h-full w-[280px] fixed left-0 top-0 pt-16 bg-surface-container-low/60 backdrop-blur-2xl border-r border-white/20 shadow-md flex-col p-2 gap-2 z-40 flex transition-transform duration-300">
        <div class="mt-4 px-3 py-2">
            <button onclick="startNewChat()"
                class="w-full py-3 px-4 bg-primary text-on-primary rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-transform hover:bg-primary/90">
                <span class="material-symbols-outlined text-lg">add</span>
                Chat Baru
            </button>
        </div>

        <!-- Mode Indicator -->
        <div class="px-3 py-2">
            <div class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 px-2">Mode Aktif
            </div>
            <div id="current-mode-display"
                class="flex items-center gap-2 px-3 py-2 bg-white/30 rounded-lg border border-white/40">
                <span id="mode-icon" class="material-symbols-outlined text-primary text-lg">chat</span>
                <span id="mode-label" class="text-sm font-medium">Assistant</span>
            </div>
        </div>

        <!-- History Placeholder -->
        <div class="flex-1 overflow-y-auto custom-scroll px-2 mt-2">
            <div class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 px-2">Riwayat</div>
            <div class="text-on-surface-variant/50 text-sm px-3 py-2 italic">Belum ada riwayat</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="md:ml-[280px] min-h-screen flex flex-col pt-16 relative transition-all duration-300">

        <!-- Background decorative -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="floating-shape w-96 h-96 bg-primary/5 top-1/4 left-1/4"></div>
            <div class="floating-shape w-96 h-96 bg-cyan-200/5 bottom-1/4 right-1/4"></div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 relative z-10 w-full max-w-4xl mx-auto">

            <!-- Welcome State -->
            <div id="welcome-state" class="w-full flex flex-col items-center text-center mb-8">
                <div class="relative w-20 h-20 mb-6">
                    <div
                        class="absolute inset-0 bg-white/40 backdrop-blur-md rounded-2xl border border-white/60 shadow-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-4xl text-primary">smart_toy</span>
                    </div>
                </div>
                <h1 class="text-3xl md:text-4xl font-headline font-bold text-on-surface tracking-tight mb-2">
                    Horizon <span class="text-primary">AI</span> Workspace
                </h1>
                <p class="text-on-surface-variant max-w-md mx-auto opacity-80 text-sm md:text-base">
                    Asisten bisnis untuk operasional, konten, dan analisis Horizon Shuttle.
                </p>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="w-full flex-1 overflow-y-auto custom-scroll space-y-4 mb-4 hidden">
                <!-- Messages appear here -->
            </div>

            <!-- Input Area -->
            <div
                class="w-full glass-panel rounded-2xl p-4 shadow-[0_12px_40px_rgba(0,0,0,0.05)] border border-white/40">

                <!-- Mode Selector -->
                <div class="flex items-center gap-2 mb-3 px-1">
                    <div class="relative">
                        <select id="mode-selector" onchange="changeMode(this.value)"
                            class="appearance-none bg-white/50 hover:bg-white/70 border border-white/40 rounded-lg px-3 py-1.5 pr-8 text-sm font-medium text-on-surface cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors">
                            <option value="assistant">&#128172; Assistant</option>
                            <option value="draft">&#9997; Draft</option>
                            <option value="insight">&#128200; Insight</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-sm pointer-events-none text-on-surface-variant">keyboard_arrow_down</span>
                    </div>
                    <span id="mode-desc" class="text-xs text-on-surface-variant/70">Tanya tentang SOP, kebijakan,
                        informasi internal</span>
                </div>

                <!-- Input Wrapper -->
                <div
                    class="relative flex items-end glass-input rounded-xl p-2 focus-within:ring-2 focus-within:ring-primary/10 transition-all">
                    <textarea id="chat-input"
                        class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface py-2 px-2 resize-none placeholder:text-on-surface-variant/50 font-body text-base max-h-32"
                        oninput="autoResize(this)" onkeydown="handleKeyDown(event)"
                        placeholder="Tanya tentang Horizon Shuttle..." rows="1"></textarea>

                    <div class="flex items-center gap-2 pl-2 pb-1">
                        <button onclick="sendMessage()" id="send-btn"
                            class="bg-primary hover:bg-primary/90 text-on-primary h-10 w-10 rounded-xl flex items-center justify-center shadow-md active:scale-90 transition-all disabled:opacity-50">
                            <span class="material-symbols-outlined">arrow_upward</span>
                        </button>
                    </div>
                </div>

                <!-- Loading -->
                <div id="loading-indicator" class="hidden flex items-center gap-2 mt-3 px-2">
                    <div class="flex gap-1">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                    <span class="text-xs text-on-surface-variant">Horizon AI sedang berpikir...</span>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/workspace.js"></script>
</body>

</html>
