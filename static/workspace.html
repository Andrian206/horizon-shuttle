<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon AI Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 flex justify-between">
        <div>
            <h1>Horizon AI Workspace</h1>
            <p>Internal Business Assistant</p>
        </div>
        <button onclick="logout()" class="text-sm underline">Logout</button>
    </header>
    
    <!-- Mode Selector -->
    <div class="bg-white p-3 border-b flex gap-2">
        <select id="mode-selector" class="border rounded px-3 py-1">
            <option value="assistant">💬 Assistant</option>
            <option value="draft">✍️ Draft</option>
            <option value="insight">📈 Insight</option>
        </select>
        <span id="mode-description" class="text-sm text-gray-600 self-center">
            Tanya tentang SOP, kebijakan, informasi internal
        </span>
    </div>
    
    <!-- Chat Area -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Messages -->
    </div>
    
    <!-- Input Area -->
    <div class="bg-white p-4 border-t">
        <div class="flex gap-2">
            <input type="text" id="chat-input" 
                   placeholder="Ketik pesan..." 
                   class="flex-1 border rounded-lg px-4 py-2">
            <button onclick="sendWorkspaceMessage()" 
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg">
                Kirim
            </button>
        </div>
    </div>
    
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/chat-workspace.js"></script>
</body>
</html>
